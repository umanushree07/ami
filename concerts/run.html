<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AMIvault</title>

<link rel="stylesheet" href="stylee.css">

</head>

<body>


<div class="container-scroll">
<div class="container">
<h1 class="title">Run Seokjin Encore Day 1 </h1>

<div class="video">
<iframe src="https://ok.ru/videoembed/11074059504358"
allowfullscreen>
</iframe>
</div>

<button class="like-btn" onclick="likeMovie()">
Like <span id="like-count">0</span>
</button>


</div>

<script>

let likes = localStorage.getItem("movieLikes");

if(likes === null){
likes = 0;
}

document.getElementById("like-count").innerText = likes;

function likeMovie(){
likes++;
localStorage.setItem("movieLikes", likes);
document.getElementById("like-count").innerText = likes;
}

</script>
